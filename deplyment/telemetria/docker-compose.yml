name: telemetria
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: POSTGRES
      POSTGRES_DB: books-db
    volumes:
      - "C:/distribuida2626/db:/var/lib/postgresql/data"
    ports:
      - 54321:5432

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config:/etc/prometheus
    ports: #esto lo pusimos para poder ver desde fuera
      - 9090:9090

#  # === NUEVO SERVICIO GRAFANA ===
  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - 3000:3000

  proxy:
    image: traefik:3.7.5
    command: |
      --api.insecure=true
      --api.dashboard=true
      --entryPoints.http.address=":80"
      --entryPoints.traefik.address=":8080"
      --entryPoints.metrics.address=":8082"
      --providers.consulCatalog
      --providers.consulCatalog.endpoint.address=consul:8500
      --providers.consulCatalog.exposedByDefault=false
      --providers.consulCatalog.refreshInterval=5s
      --metrics.prometheus=true
      --metrics.prometheus.entryPoint=metrics

    ports:
      - 8888:8080
      - 8080:80
      - 8082:8082

  postgresql-exporter:
    image: prometheuscommunity/postgres-exporter
    environment:
      DATA_SOURCE_URI: "db-server:5432/books20262026?sslmode=disable"
      DATA_SOURCE_USER: postgres
      DATA_SOURCE_PASS: labcom,2015

  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: POSTGRES
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8070:8080
#    expose:
#      - 8070

  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8060:8080
#    expose:
#      - 8080

#  customers:
#    build:
#      context: ../../app-customers
#      dockerfile: src/main/docker/Dockerfile.jvm
#    container_name: app-customers
#    environment:
#      SERVER_PORT: 8080
#      SPRING_CLOUD_CONSUL_HOST: consul
#      SPRING_CLOUD_CONSUL_PORT: 8500
#    ports:
#      - 8090:8080
#    expose:
#      - 8090

volumes:
  postgres_data:

