name: telemetria
services:
  db-server:
    image: postgres:17.10-alpine3.24
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: POSTGRES
      POSTGRES_DB: books-db
    volumes:
      - "C:/distribuida2626/db:/var/lib/postgresql/data"
    ports:
      - 54321:5432

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./config:/etc/prometheus
    ports:
      - 9090:9090

  # === NUEVO SERVICIO GRAFANA ===
#  grafana:
#    image: grafana/grafana:latest
#    container_name: grafana-app
#    ports:
#      - 3000:3000
#    environment:
#      - GF_SECURITY_ADMIN_PASSWORD=admin  # Contraseña inicial (puedes cambiarla)
#    volumes:
#      - grafana_data:/var/lib/grafana
#    depends_on:
#      - prometheus

  authors:
    build:
      context: ../../app-authors
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: authors-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: POSTGRES
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8070:8080
    expose:
      - 8080

  books:
    build:
      context: ../../app-books
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: books-app
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-server:5432/books-db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_HTTP_PORT: 8080
      CONSUL_HOST: consul
      CONSUL_PORT: 8500
    ports:
      - 8080:8080
    expose:
      - 8080

  customers:
    build:
      context: ../../app-customers
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: app-customers
    environment:
      SERVER_PORT: 8080
      SPRING_CLOUD_CONSUL_HOST: consul
      SPRING_CLOUD_CONSUL_PORT: 8500
    ports:
      - 8090:8080
    expose:
      - 8080

volumes:
  postgres_data:

