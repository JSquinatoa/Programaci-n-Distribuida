server:
  port: 8090
spring:
  application:
    name: app-customers
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        tags:
          - framework=springboot-4.0.6
          - traefik.enable=true
          - traefik.http.routers.router-app-customers.rule=PathPrefix(`/app-customers`)
          - traefik.http.routers.router-app-customers.middlewares=middlewares-customers
          - traefik.http.middlewares.middlewares-customers.stripprefix.prefixes=/app-customers
# === CONFIGURACIÓN DE TELEMETRÍA ===
management:
  endpoints:
    web:
      exposure:
        include: "prometheus,health" # <-- Exponemos ambos endpoints
  metrics:
    tags:
      application: ${spring.application.name}